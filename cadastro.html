<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastrar Local - Pontos Turísticos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

    <div id="page-home" class="d-flex flex-column min-vh-100">

      <header id="hero">
        <div id="hero-track"></div>
        <div id="hero-text">
          <p id="hero-subtitle">Expanda os horizontes</p>
          <h1 id="hero-title">Novo Local</h1>
        </div>
        <div id="hero-dots"></div>
      </header>

      <nav id="site-nav" class="navbar navbar-expand-md px-3 py-2">
        <div id="nav-links" class="navbar-nav me-auto">
          <a href="index.html" class="nav-link">Voltar para o Início</a>
        </div>
      </nav>

      <div class="container flex-grow-1 my-5">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8">
            
            
            <div class="student-card p-4">
              <h2 class="aside-title text-center mb-4" style="font-size: 1.4rem;">Formulário de Cadastro</h2>
              
              <form id="form-cadastro">
                <div class="mb-3">
                  <label for="nome-local" class="form-label" style="color: var(--clr-accent);">Nome do Local</label>
                  <input type="text" class="form-control bg-dark text-light border-secondary" id="nome-local" required placeholder="Ex: Castelo de Hyrule">
                </div>

                <div class="mb-3">
                  <label for="universo-local" class="form-label" style="color: var(--clr-accent);">Universo / Mundo</label>
                  <input type="text" class="form-control bg-dark text-light border-secondary" id="universo-local" required placeholder="Ex: The Legend of Zelda">
                </div>

                <div class="mb-3">
                  <label for="categoria-local" class="form-label" style="color: var(--clr-accent);">Categoria</label>
                  <input type="text" class="form-control bg-dark text-light border-secondary" id="categoria-local" required placeholder="Ex: Anime, Jogos, Séries">
                </div>

                <div class="mb-3">
                  <label for="imagem-local" class="form-label" style="color: var(--clr-accent);">URL da Imagem</label>
                  <input type="url" class="form-control bg-dark text-light border-secondary" id="imagem-local" placeholder="Ex: https://site.com/imagem.png">
                  <div class="form-text text-muted">Deixe em branco para usar uma imagem padrão.</div>
                </div>

                <div class="mb-3">
                  <label for="descricao-local" class="form-label" style="color: var(--clr-accent);">Descrição</label>
                  <textarea class="form-control bg-dark text-light border-secondary" id="descricao-local" rows="3" required placeholder="Escreva uma breve descrição sobre este ponto turístico..."></textarea>
                </div>

                <div class="mb-3">
                  <label for="atracoes-local" class="form-label" style="color: var(--clr-accent);">Principais Atrações (Separadas por vírgula)</label>
                  <input type="text" class="form-control bg-dark text-light border-secondary" id="atracoes-local" required placeholder="Ex: Templo do Tempo, Sala do Trono, Jardins">
                </div>

                <button type="submit" class="btn btn-warning w-100 mt-3" style="background-color: var(--clr-accent); border: none; font-family: var(--font-display); font-weight: bold;">
                  Cadastrar Local
                </button>
              </form>

              <div id="mensagem-sucesso" class="alert alert-success mt-3 d-none" role="alert">
                Local cadastrado com sucesso! Redirecionando...
              </div>

            </div>

          </div>
        </div>
      </div>

      <footer class="text-center py-3 mt-auto">
        <p class="mb-0">Nenhum direito reservado &mdash; Todos os mundos pertencem aos seus criadores</p>
      </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="cadastro.js"></script>
  </body>
</html>
